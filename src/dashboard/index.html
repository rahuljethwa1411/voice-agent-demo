<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Leads Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 1.5rem;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold mb-2 tracking-tight">Voice AI Leads</h1>
                <p class="text-slate-400 flex items-center">
                    <span class="pulse-dot mr-2"></span> System Live: Capturing Student Data
                </p>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-500 uppercase tracking-widest mb-1">Total Leads</div>
                <div id="lead-count" class="text-5xl font-bold text-indigo-400">0</div>
            </div>
        </div>

        <!-- Table Container -->
        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 border-b border-white/10">
                    <tr>
                        <th class="px-8 py-4 text-slate-400 font-medium">Student Name</th>
                        <th class="px-8 py-4 text-slate-400 font-medium">Interested Course</th>
                        <th class="px-8 py-4 text-slate-400 font-medium">Call Time</th>
                        <th class="px-8 py-4 text-slate-400 font-medium">Status</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <!-- Leads will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // No Supabase SDK needed! Our Express backend handles the database.
        async function fetchLeads() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            updateTable(leads);
        }

        function updateTable(leads) {
            const body = document.getElementById('leads-body');
            const count = document.getElementById('lead-count');

            count.innerText = leads.length;

            body.innerHTML = leads.map(lead => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                    <td class="px-8 py-6 font-semibold text-lg">${lead.name || 'Unknown'}</td>
                    <td class="px-8 py-6">
                        <span class="px-3 py-1 rounded-full bg-indigo-500/20 text-indigo-300 text-sm border border-indigo-500/30">
                            ${lead.course || 'N/A'}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-slate-400">${new Date(lead.created_at).toLocaleString()}</td>
                    <td class="px-8 py-6">
                        <span class="text-emerald-400 flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                            </svg>
                            ${lead.status || 'Interested'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // Initial load + poll every 5 seconds for near-real-time updates
        fetchLeads();
        setInterval(fetchLeads, 5000);
    </script>
</body>

</html>
